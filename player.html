<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

#safe{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;

/* TV SAFE AREA */
padding:60px;
box-sizing:border-box;
}

/* GRID LAYOUT */

#layout{
display:grid;
grid-template-columns:329px 1fr;
grid-template-rows:140px 1fr 220px;
height:100%;
}

/* HEADER */

#header{
grid-column:1 / span 2;
grid-row:1;
}

/* SIDEBAR */

#sidebar{
grid-column:1;
grid-row:2;
padding-top:60px;
}

/* PROMO */

#promo{
grid-column:2;
grid-row:2;
}

/* LOWER THIRD */

#lowerthird{
grid-column:1 / span 2;
grid-row:3;
}

/* IFRAMES */

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<div id="safe">

<div id="layout">

<div id="header">
<iframe src="logo.html?site=carbon"></iframe>
</div>

<div id="sidebar">
<iframe src="sidebar.html"></iframe>
</div>

<div id="promo">
<iframe src="promoScreen.html"></iframe>
</div>

<div id="lowerthird">
<iframe src="LowerThirds.html"></iframe>
</div>

</div>
</div>

</body>
</html>
