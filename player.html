<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

/* =================================
   BASE
================================= */

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
}

/* =================================
   SAFE AREA
   (for TVs with overscan)
================================= */

#safe{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;

padding:60px;
box-sizing:border-box;
}

/* =================================
   MAIN GRID
================================= */

#layout{

display:grid;

grid-template-columns:329px 1fr;

grid-template-rows:
120px     /* header */
1fr       /* main area */
220px;    /* lower third */

width:100%;
height:100%;

}

/* =================================
   HEADER
================================= */

#header{

grid-column:1 / span 2;
grid-row:1;

position:relative;

z-index:10;

}

/* =================================
   SIDEBAR
================================= */

#sidebar{

grid-column:1;
grid-row:2;

overflow:hidden;

}

/* =================================
   PROMO AREA
================================= */

#promo{

grid-column:2;
grid-row:2;

overflow:hidden;

}

/* =================================
   LOWER THIRD
================================= */

#lowerthird{

grid-column:1 / span 2;
grid-row:3;

position:relative;

z-index:20;

}

/* =================================
   IFRAME RESET
================================= */

iframe{

width:100%;
height:100%;

border:none;

display:block;

}

</style>
</head>

<body>

<div id="safe">

<div id="layout">

<!-- HEADER -->

<div id="header">
<iframe src="logo.html?site=carbon"></iframe>
</div>

<!-- SIDEBAR -->

<div id="sidebar">
<iframe src="sidebar.html"></iframe>
</div>

<!-- PROMO SCREEN -->

<div id="promo">
<iframe src="promoScreen.html"></iframe>
</div>

<!-- LOWER THIRD -->

<div id="lowerthird">
<iframe src="LowerThirds.html"></iframe>
</div>

</div>

</div>

</body>
</html>
