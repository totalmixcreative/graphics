<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

/* ============================
BASE
============================ */

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
cursor:none;
}
	
/* ===============================
   LOOPING BACKGROUND VIDEO
=============================== */

#bgVideo{
  position:absolute;
  top:0;
  left:10;
  width:360px;
  height:100%;
  object-fit:cover;
  z-index:1;
  pointer-events:none;
}

/* ============================
SIGNAGE CANVAS
============================ */

#canvas{

position:relative;

width:1920px;
height:1080px;

margin:auto;

}

/* ============================
HEADER
============================ */

#header{

position:absolute;

top:18px;
left:20px;

width:100%;
height:100%;

z-index:50;

}

/* ============================
SIDEBAR
============================ */

#sidebar{

position:absolute;

top:180px;
	left:30px;

width:329px;
height:680px;

z-index:40;

}

/* ============================
PROMO AREA
============================ */

#promo{

position:absolute;

width:100%;
top:0px;
left:359px;

right:0px;
bottom:220px;

z-index:10;

}

/* ============================
LOWER THIRD
============================ */

#lowerthird{

position:absolute;
width:100%;
left:0px;
right:60px;

bottom:0px;

height:220px;

z-index:100;

}
	

/* ============================
IFRAMES
============================ */

iframe{

width:100%;
height:100%;

border:none;

}

</style>

</head>

<body>

<div id="canvas">

<div id="header">
<iframe id="headerFrame"></iframe>
</div>

<div id="sidebar">
<iframe src="sidebar.html"></iframe>
</div>

<div id="promo">
<iframe src="promoScreen.html"></iframe>
</div>

<div id="lowerthird">
<iframe src="LowerThirds.html"></iframe>
</div>
	
	 <!-- LOOPING BACKGROUND -->
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="https://totalmixcreative.github.io/graphics/Side%20Bar%20BG.mp4" type="video/mp4">
  </video>

</div>
	
	<script>

setInterval(() => {
  window.focus();
}, 5000);

setInterval(()=>{
 location.reload();
},21600000); // 6 hours

const params = new URLSearchParams(window.location.search);
const venue = params.get("venue") || "carbon";

document.getElementById("headerFrame").src =
"logo.html?site=" + venue;

</script>

</body>
</html>
